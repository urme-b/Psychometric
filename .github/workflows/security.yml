name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly, Monday 06:00 UTC

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Works whether or not a package-lock.json is committed:
      # generate a lockfile in place without installing packages.
      - name: Ensure lockfile
        run: npm install --package-lock-only

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true  # advisory-only rollout; remove this line to make high/critical CVEs block the build
